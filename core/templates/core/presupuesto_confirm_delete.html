{% extends "core/base.html" %}
{% block title %}Eliminar Presupuesto{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-body text-center p-4">
                <h4 class="card-title text-danger mb-4">
                    <i class="bi bi-exclamation-triangle"></i> Confirmar Eliminación
                </h4>
                <p>¿Estás seguro de eliminar el presupuesto de <strong>{{ object.get_mes_display }} {{ object.año }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                        <a href="{% url 'presupuesto_list' %}" class="btn btn-secondary">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
